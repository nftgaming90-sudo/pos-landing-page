<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <title>Akses PosKita</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-600 h-[100dvh] flex items-center justify-center p-4 font-sans">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md transform transition-all">
        <div class="text-center mb-8">
            <h1 class="text-4xl mb-2">🏪</h1>
            <h2 id="auth-title" class="text-2xl font-black text-gray-800 uppercase tracking-tight">Login PosKita</h2>
            <p id="auth-subtitle" class="text-sm text-gray-500 font-medium">Masuk untuk kelola toko Anda</p>
        </div>
        
        <form id="auth-form" class="space-y-4">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Email Toko</label>
                <input id="email" type="email" autocomplete="username" required
                    class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-bold text-gray-700">
            </div>
            
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Password</label>
                <input id="password" type="password" autocomplete="current-password" required
                    class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-bold text-gray-700">
            </div>

            <div id="reg-extra" class="hidden space-y-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Nama Toko</label>
                    <input id="nama_toko" type="text" placeholder="Contoh: Toko Berkah"
                        class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-gray-700">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">WhatsApp Owner</label>
                    <input id="wa_owner" type="number" placeholder="62812..."
                        class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-gray-700">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Alamat Toko</label>
                    <textarea id="alamat_toko" placeholder="Jl. Raya No. 123..."
                        class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-gray-700"></textarea>
                </div>
            </div>

            <button type="submit" id="btn-submit" 
                class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 active:scale-95 uppercase tracking-widest text-sm">
                MASUK SEKARANG
            </button>
        </form>

        <div class="mt-6 text-center">
            <button id="toggle-auth" class="text-[11px] font-black text-blue-600 uppercase tracking-wider hover:underline">
                Belum punya akun? Daftar Toko Baru
            </button>
        </div>
        
        <p id="error-msg" class="text-rose-500 text-[10px] font-black mt-4 text-center hidden uppercase tracking-wider bg-rose-50 p-2 rounded-lg border border-rose-100"></p>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword,
        setPersistence, 
        browserLocalPersistence 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const firebaseConfig = { 
        apiKey: "AIzaSyCLlFeBekEZzdtkeFvItwqMPa2jxrLleb4",
        authDomain: "pos-keliling.firebaseapp.com",
        projectId: "pos-keliling",
        storageBucket: "pos-keliling.firebasestorage.app",
        messagingSenderId: "379944511316",
        appId: "1:379944511316:web:27f1fd19eb3f48c5d64ac1",
        measurementId: "G-Y4VBGVX42N"
    };

    const supabaseUrl = 'https://falswzbhwpwugjolretc.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhbHN3emJod3B3dWdqb2xyZXRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU0MTcsImV4cCI6MjA5MDQ1MTQxN30.BpKmybIT-eeggCbuEbj8SSwvbq7eA7XCIu6Pc88xG1s';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const authForm = document.getElementById('auth-form');
    const btnSubmit = document.getElementById('btn-submit');
    const errorElement = document.getElementById('error-msg');
    const toggleBtn = document.getElementById('toggle-auth');
    const authTitle = document.getElementById('auth-title');
    const authSubtitle = document.getElementById('auth-subtitle');
    const regExtra = document.getElementById('reg-extra');

    let isLoginMode = true;

    // Fungsi Toggle Tunggal (Sudah Diperbaiki)
    toggleBtn.onclick = () => {
        isLoginMode = !isLoginMode;
        errorElement.classList.add('hidden');
        
        if (isLoginMode) {
            authTitle.innerText = "Login PosKita";
            authSubtitle.innerText = "Masuk untuk kelola toko Anda";
            btnSubmit.innerText = "MASUK SEKARANG";
            toggleBtn.innerText = "Belum punya akun? Daftar Toko Baru";
            regExtra.classList.add('hidden');
            // Matikan required saat login
            document.getElementById('nama_toko').required = false;
        } else {
            authTitle.innerText = "Daftar Toko";
            authSubtitle.innerText = "Mulai kelola bisnis Anda hari ini";
            btnSubmit.innerText = "BUAT AKUN SEKARANG";
            toggleBtn.innerText = "Sudah punya akun? Login saja";
            regExtra.classList.remove('hidden');
            // Aktifkan required saat daftar
            document.getElementById('nama_toko').required = true;
        }
    };

    authForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        // Ambil data tambahan
        const namaToko = document.getElementById('nama_toko').value;
        const waOwner = document.getElementById('wa_owner').value;
        const alamatToko = document.getElementById('alamat_toko').value;

        btnSubmit.innerText = "PROSES...";
        btnSubmit.disabled = true;
        errorElement.classList.add('hidden');

        try {
            await setPersistence(auth, browserLocalPersistence);

            if (isLoginMode) {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                // 1. Register ke Firebase
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Register ke Supabase Tabel 'users'
                const { error: sbError } = await supabase
                    .from('users')
                    .insert([{ id: user.uid, is_pro: false }]);

                if (sbError) throw sbError;

                // 3. Register ke Tabel 'pengaturan' (Gunakan data dari input)
                const { error: setError } = await supabase
                    .from('pengaturan')
                    .insert([{ 
                        user_id: user.uid, 
                        nama_toko: namaToko || "Toko Baru",
                        alamat_toko: alamatToko || "",
                        wa_owner: waOwner || "",
                        fonnte_token: "" 
                    }]);

                if (setError) throw setError;
            }
            
            window.location.replace("dashboard.html");
        } catch (error) {
            console.error("Auth Error:", error);
            btnSubmit.innerText = isLoginMode ? "MASUK SEKARANG" : "BUAT AKUN SEKARANG";
            btnSubmit.disabled = false;
            
            let msg = error.message || "Terjadi kesalahan. Coba lagi.";
            if (error.code === 'auth/email-already-in-use') msg = "Email sudah terdaftar!";
            if (error.code === 'auth/weak-password') msg = "Password minimal 6 karakter!";
            if (error.code === 'auth/invalid-credential') msg = "Email atau password salah!";
            
            errorElement.innerText = msg;
            errorElement.classList.remove('hidden');
        }
    };
</script>
</body>
</html>
