<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <title>Login PosKita</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-600 h-[100dvh] flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md transform transition-all">
        <div class="text-center mb-8">
            <h1 class="text-4xl mb-2">🏪</h1>
            <h2 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Login PosKita</h2>
            <p class="text-sm text-gray-500 font-medium">Masuk untuk kelola toko Anda</p>
        </div>
        
        <form id="form-login" class="space-y-4">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Email Toko</label>
                <input id="email" type="email" name="email" autocomplete="username" required
                    class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-bold text-gray-700">
            </div>
            
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Password</label>
                <input id="password" type="password" name="password" autocomplete="current-password" required
                    class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-bold text-gray-700">
            </div>

            <button type="submit" id="btn-login" 
                class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 active:scale-95 uppercase tracking-widest text-sm">
                MASUK SEKARANG
            </button>
        </form>
        
        <p id="error-msg" class="text-rose-500 text-[10px] font-black mt-4 text-center hidden uppercase tracking-wider bg-rose-50 p-2 rounded-lg border border-rose-100"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCLlFeBekEZzdtkeFvItwqMPa2jxrLleb4",
            authDomain: "pos-keliling.firebaseapp.com",
            projectId: "pos-keliling",
            storageBucket: "pos-keliling.firebasestorage.app",
            messagingSenderId: "379944511316",
            appId: "1:379944511316:web:27f1fd19eb3f48c5d64ac1",
            measurementId: "G-Y4VBGVX42N"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('form-login');
        const btnLogin = document.getElementById('btn-login');
        const errorElement = document.getElementById('error-msg');

        loginForm.onsubmit = async (e) => {
            e.preventDefault(); // Cegah reload halaman
            
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            btnLogin.innerText = "PROSES...";
            btnLogin.disabled = true;
            errorElement.classList.add('hidden');

            try {
                // 1. SET PERSISTENCE: Kunci agar login tidak hilang pas app ditutup (Slide Off)
                await setPersistence(auth, browserLocalPersistence);

                // 2. PROSES LOGIN
                await signInWithEmailAndPassword(auth, email, pass);
                
                // 3. REDIRECT KE DASHBOARD
                window.location.replace("dashboard.html");
            } catch (error) {
                console.error(error);
                btnLogin.innerText = "MASUK SEKARANG";
                btnLogin.disabled = false;
                errorElement.innerText = "Ups! Email atau password salah.";
                errorElement.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
