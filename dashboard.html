<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PosKita - Kasir Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col">

    <nav class="bg-blue-600 p-3 text-white flex justify-between items-center shadow-md shrink-0">
        <h1 class="text-lg font-bold flex items-center gap-2">
            🚀 PosKita <span class="text-xs font-normal bg-blue-500 px-2 py-0.5 rounded">Toko Mode</span>
        </h1>
        <div class="flex items-center gap-4 text-sm">
            <span id="user-email" class="hidden md:inline italic opacity-80">Memuat...</span>
            <button id="btn-logout" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded transition text-xs font-bold">LOGOUT</button>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden p-3 gap-3">
        <section class="w-full md:w-2/3 bg-white rounded-xl shadow-md flex flex-col overflow-hidden border border-gray-200">
            <div class="p-3 border-b bg-gray-50 flex flex-wrap gap-2 items-center justify-between">
                <input type="text" id="search-barang" placeholder="Cari nama barang..." class="flex-1 min-w-[200px] border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                <button id="btn-download" class="bg-blue-600 text-white text-xs px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                    MUAT DATABASE TERBARU
                </button>
            </div>

            <div class="overflow-y-auto flex-1">
                <table class="w-full text-left text-sm">
                    <thead class="sticky top-0 bg-white border-b shadow-sm text-gray-500">
                        <tr>
                            <th class="p-3">Produk</th>
                            <th class="p-3 text-center">Stok</th>
                            <th class="p-3 text-right">Harga</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="3" class="p-10 text-center text-gray-400 italic">Klik tombol biru untuk sinkron data Cloud.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div id="db-status-bar" class="p-2 bg-gray-100 text-[10px] text-gray-500 flex justify-between border-t uppercase tracking-wider">
                <span id="db-status">Status: Offline</span>
                <span id="row-count">0 Produk</span>
            </div>
        </section>

        <section class="w-full md:w-1/3 bg-white rounded-xl shadow-lg flex flex-col overflow-hidden border-2 border-blue-100">
            <div class="p-4 bg-blue-50 border-b flex justify-between items-center">
                <h2 class="font-bold text-blue-800">🛒 Keranjang</h2>
                <button onclick="clearCart()" class="text-[10px] text-red-500 font-bold hover:underline">KOSONGKAN</button>
            </div>

            <div id="cart-items" class="flex-1 overflow-y-auto p-3 space-y-2">
                <div class="text-center mt-20 text-gray-300 text-sm">Belum ada barang dipilih</div>
            </div>

            <div class="p-4 bg-gray-50 border-t">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-600 font-semibold uppercase text-xs">Total Akhir</span>
                    <span id="cart-total" class="text-2xl font-black text-blue-700">Rp 0</span>
                </div>
                
                <button id="btn-proses-bayar" disabled class="w-full py-4 bg-green-500 text-white rounded-xl font-bold shadow-lg disabled:bg-gray-200 disabled:text-gray-400 transition-all active:scale-95 flex flex-col">
                    <span>SELESAI & UPLOAD BARU</span>
                    <span class="text-[9px] font-normal opacity-80 uppercase mt-1">Simpan sebagai Backup Terbaru</span>
                </button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const firebaseConfig = {
            apiKey: "AIzaSyCLlFeBekEZzdtkeFvItwqMPa2jxrLleb4",
            authDomain: "pos-keliling.firebaseapp.com",
            projectId: "pos-keliling",
            storageBucket: "pos-keliling.firebasestorage.app",
            messagingSenderId: "379944511316",
            appId: "1:379944511316:web:27f1fd19eb3f48c5d64ac1"
        };
        const supabaseUrl = 'https://falswzbhwpwugjolretc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhbHN3emJod3B3dWdqb2xyZXRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU0MTcsImV4cCI6MjA5MDQ1MTQxN30.BpKmybIT-eeggCbuEbj8SSwvbq7eA7XCIu6Pc88xG1s';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const supabase = createClient(supabaseUrl, supabaseKey);

        window.db = null;
        window.masterData = [];
        window.cart = [];
        window.currentUid = null;
        window.currentFileName = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUid = user.uid;
                document.getElementById('user-email').innerText = user.email;
                initStorage(user.uid);
            } else {
                window.location.replace("login.html");
            }
        });

        // DETEKSI FILE PALING BARU (BERDASARKAN TANGGAL UPDATE)
        async function initStorage(uid) {
            const status = document.getElementById('db-status');
            try {
                const { data, error } = await supabase.storage.from('backup').list(uid, {
                    sortBy: { column: 'updated_at', order: 'desc' }
                });
                
                if (data && data.length > 0) {
                    const dbFile = data.find(f => f.name.endsWith('.db'));
                    if (dbFile) {
                        window.currentFileName = dbFile.name;
                        status.innerText = "File Terkini: " + dbFile.name;
                        status.classList.add('text-green-600');
                    }
                } else {
                    status.innerText = "Tidak ada file .db di folder UID.";
                }
            } catch (e) { console.error(e); }
        }

        // GENERATE NAMA FILE BARU (Waktu WITA)
function getNewTimestampName() {
    const now = new Date();
    
    // Ambil tanggal format YYYY-MM-DD sesuai WITA
    const dateOpts = { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'Asia/Makassar' };
    const [m, d, y] = now.toLocaleString('en-US', dateOpts).split('/');
    const dateStr = `${y}-${m}-${d}`;

    // Ambil jam & menit sesuai WITA
    const timeOpts = { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Makassar' };
    const timeStr = now.toLocaleString('en-US', timeOpts).replace(':', '-');

    return `${dateStr}_${timeStr}.db`; 
    // Hasilnya pasti: 2026-04-05_00-05.db (Sesuai jam kamu sekarang)
}

        window.tambahKeKeranjang = (id, nama, harga, stok) => {
            if (stok <= 0) return alert("Stok habis!");
            const exist = window.cart.find(i => i.id === id);
            if (exist) {
                if (exist.qty >= stok) return alert("Stok tidak mencukupi!");
                exist.qty++;
            } else {
                window.cart.push({ id, nama, harga, qty: 1, stokMax: stok });
            }
            renderCart();
        };

        window.hapusItemCart = (idx) => {
            window.cart.splice(idx, 1);
            renderCart();
        };

        window.clearCart = () => {
            if (confirm("Kosongkan keranjang?")) {
                window.cart = [];
                renderCart();
            }
        };

        function renderCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const btn = document.getElementById('btn-proses-bayar');
            
            if (window.cart.length === 0) {
                container.innerHTML = '<div class="text-center mt-20 text-gray-300 text-sm italic">Keranjang kosong</div>';
                totalEl.innerText = "Rp 0";
                btn.disabled = true;
                return;
            }

            let total = 0;
            container.innerHTML = window.cart.map((item, index) => {
                total += (item.harga * item.qty);
                return `
                    <div class="flex justify-between items-center bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <div class="flex-1">
                            <p class="font-bold text-xs text-gray-800">${item.nama}</p>
                            <p class="text-[10px] text-blue-600">${item.qty} x Rp ${item.harga.toLocaleString('id-ID')}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-sm text-gray-700">Rp ${(item.harga * item.qty).toLocaleString('id-ID')}</span>
                            <button onclick="hapusItemCart(${index})" class="text-red-400">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            totalEl.innerText = "Rp " + total.toLocaleString('id-ID');
            btn.disabled = false;
        }

        function renderTable(dataArray) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = dataArray.map(row => {
                const nama = row[0], stok = row[1], harga = row[2], id = row[4];
                return `
                    <tr onclick="window.tambahKeKeranjang('${id}', '${nama}', ${harga}, ${stok})" class="cursor-pointer hover:bg-blue-50 transition border-b group">
                        <td class="p-3">
                            <div class="font-medium text-gray-800">${nama}</div>
                        </td>
                        <td class="p-3 text-center">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold ${stok < 5 ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-600'}">
                                ${stok}
                            </span>
                        </td>
                        <td class="p-3 text-right font-bold text-blue-600">Rp ${harga.toLocaleString('id-ID')}</td>
                    </tr>
                `;
            }).join('');
            document.getElementById('row-count').innerText = `${dataArray.length} Produk`;
        }

        document.getElementById('btn-download').onclick = async () => {
            if (!window.currentFileName) return alert("File database tidak ditemukan di Supabase.");
            const btn = document.getElementById('btn-download');
            btn.innerText = "DOWNLOADING...";
            
            try {
                const { data } = await supabase.storage.from('backup').createSignedUrl(`${window.currentUid}/${window.currentFileName}`, 60);
                const response = await fetch(data.signedUrl);
                const buf = await response.arrayBuffer();
                const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` });
                window.db = new SQL.Database(new Uint8Array(buf));
                
                const res = window.db.exec("SELECT nama, stok, harga_jual, modal, rowid FROM barang ORDER BY nama ASC");
                if (res.length > 0) {
                    window.masterData = res[0].values;
                    renderTable(window.masterData);
                }
                btn.innerText = "DB TERHUBUNG";
            } catch (err) {
                alert("Error: " + err.message);
                btn.innerText = "MUAT ULANG";
            }
        };

        // SIMPAN DENGAN NAMA FILE BARU
        // SIMPAN DENGAN AUTO-CLEANUP (MAKSIMAL 5 FILE)
document.getElementById('btn-proses-bayar').onclick = async () => {
    if (!confirm("Selesaikan transaksi dan buat backup baru? (Sistem akan menghapus backup usang)")) return;
    const btn = document.getElementById('btn-proses-bayar');
    btn.innerText = "SAVING & CLEANING...";
    btn.disabled = true;

    try {
        // 1. Update RAM (SQLite)
        window.cart.forEach(item => {
            window.db.run("UPDATE barang SET stok = stok - ? WHERE rowid = ?", [item.qty, item.id]);
        });

        // 2. Export & Upload File Baru
        const binaryDb = window.db.export();
        const fileBlob = new Blob([binaryDb], { type: 'application/x-sqlite3' });
        const newFileName = getNewTimestampName();
        const filePath = `${window.currentUid}/${newFileName}`;

        const { error: uploadError } = await supabase.storage.from('backup').upload(filePath, fileBlob);
        if (uploadError) throw uploadError;

        // 3. LOGIKA CLEANUP (Hanya sisakan 5 teratas)
        const { data: allFiles } = await supabase.storage.from('backup').list(window.currentUid, {
            sortBy: { column: 'updated_at', order: 'desc' }
        });

        if (allFiles && allFiles.length > 5) {
            // Ambil nama file selain 5 file terbaru
            const filesToDelete = allFiles.slice(5).map(f => `${window.currentUid}/${f.name}`);
            
            // Eksekusi hapus massal
            const { error: deleteError } = await supabase.storage.from('backup').remove(filesToDelete);
            if (deleteError) console.warn("Gagal hapus file lama:", deleteError);
            else console.log("Cleanup berhasil, 5 file terbaru dipertahankan.");
        }

        alert("SUKSES!\nStok terupdate dan storage dibersihkan.");
        location.reload(); 

    } catch (err) {
        alert("Gagal: " + err.message);
        btn.innerText = "SIMPAN LAGI";
        btn.disabled = false;
    }
};

        document.getElementById('search-barang').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = window.masterData.filter(row => row[0].toLowerCase().includes(val));
            renderTable(filtered);
        };

        document.getElementById('btn-logout').onclick = () => {
            signOut(auth).then(() => window.location.replace("index.html"));
        };
    </script>
</body>
</html>
